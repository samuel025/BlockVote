<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="UniVote — DID-based blockchain voting system for university elections with zero-knowledge proof verification." />
    <title>UniVote — University Voting System</title>
  </head>
  <body>
    <div id="error-boundary" style="color: red; padding: 20px; font-family: monospace;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-boundary').innerHTML += '<p>' + message + ' at ' + source + ':' + lineno + '</p>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-boundary').innerHTML += '<p>Unhandled Promise: ' + (event.reason ? event.reason.message || event.reason : 'Unknown error') + '</p>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
